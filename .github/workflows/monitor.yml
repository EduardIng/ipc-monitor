name: IPC Monitor

on:
  schedule:
    - cron: "0 7,10,13,16 * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: status_cache.json
          # run_id makes key unique so cache is always saved back after each run.
          # restore-keys picks up the latest saved state.
          key: status-cache-${{ github.run_id }}
          restore-keys: status-cache

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-

      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('requirements.txt') }}
          restore-keys: playwright-chromium-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run monitor
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          APP_TRV: ${{ secrets.APP_TRV }}
          APP_WRK: ${{ secrets.APP_WRK }}
          APP_OLD: ${{ secrets.APP_OLD }}
        run: python monitor.py
