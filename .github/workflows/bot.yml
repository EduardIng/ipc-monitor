name: IPC Bot

on:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  # Lightweight job: just poll Telegram, no Playwright needed.
  # Runs every 5 minutes. Only the adhoc job installs playwright.
  poll:
    runs-on: ubuntu-22.04
    outputs:
      triggered: ${{ steps.poll.outputs.triggered }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: telegram_offset.txt
          key: telegram-offset-${{ github.run_id }}
          restore-keys: telegram-offset

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Poll Telegram for new messages
        id: poll
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python poll.py

  # Heavy job: only runs when a Telegram message was received.
  adhoc:
    needs: poll
    if: needs.poll.outputs.triggered == 'true'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: status_cache.json
          key: status-cache-bot-${{ github.run_id }}
          restore-keys: status-cache

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-

      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('requirements.txt') }}
          restore-keys: playwright-chromium-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run ad hoc check
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          APP_TRV: ${{ secrets.APP_TRV }}
          APP_WRK: ${{ secrets.APP_WRK }}
          APP_OLD: ${{ secrets.APP_OLD }}
        run: python adhoc.py
